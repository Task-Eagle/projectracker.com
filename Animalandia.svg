<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (optional, transparent by default) -->
  <rect width="400" height="500" fill="none"/>

  <!-- The Blue Shield -->
  <path d="M200 50 L350 150 L350 350 C350 420 200 480 200 480 C200 480 50 420 50 350 L50 150 Z" 
        fill="#4169E1" stroke="#2c4a9e" stroke-width="4"/>

  <!-- Gray Rock (Left - Strength) -->
  <path d="M80 250 L110 240 L130 260 L120 290 L90 285 Z" 
        fill="#808080" stroke="#555555" stroke-width="2"/>
  <!-- Rock texture details -->
  <circle cx="95" cy="265" r="3" fill="#666666"/>
  <circle cx="115" cy="275" r="2" fill="#666666"/>

  <!-- Aged Parchment (Right - Wisdom) -->
  <g transform="translate(220, 220) rotate(-10)">
    <rect x="0" y="0" width="100" height="140" rx="5" ry="5" 
          fill="#F4E4C1" stroke="#C2B280" stroke-width="2"/>
    <!-- Scroll edges -->
    <ellipse cx="50" cy="0" rx="50" ry="10" fill="#E8D4A5"/>
    <ellipse cx="50" cy="140" rx="50" ry="10" fill="#E8D4A5"/>
    <!-- Text lines representing ancient wisdom -->
    <line x1="15" y1="40" x2="85" y2="40" stroke="#8B4513" stroke-width="2"/>
    <line x1="15" y1="60" x2="85" y2="60" stroke="#8B4513" stroke-width="2"/>
    <line x1="15" y1="80" x2="70" y2="80" stroke="#8B4513" stroke-width="2"/>
    <line x1="15" y1="100" x2="80" y2="100" stroke="#8B4513" stroke-width="2"/>
  </g>

  <!-- Lion Face (Center) -->
  <g transform="translate(200, 200)">
    <!-- Mane -->
    <circle cx="0" cy="0" r="55" fill="#DAA520" opacity="0.9"/>
    <circle cx="0" cy="0" r="45" fill="#FFD700"/>
    
    <!-- Face Shape -->
    <circle cx="0" cy="0" r="35" fill="#FFE4B5"/>
    
    <!-- Eyes -->
    <circle cx="-12" cy="-5" r="6" fill="#FFFFFF"/>
    <circle cx="-12" cy="-5" r="2.5" fill="#000000"/>
    <circle cx="12" cy="-5" r="6" fill="#FFFFFF"/>
    <circle cx="12" cy="-5" r="2.5" fill="#000000"/>
    
    <!-- Nose -->
    <polygon points="0,10 -5,18 5,18" fill="#8B4513"/>
    
    <!-- Mouth -->
    <path d="M-5 18 Q0 25 5 18" fill="none" stroke="#8B4513" stroke-width="2"/>
    
    <!-- Whiskers -->
    <line x1="-15" y1="10" x2="-35" y2="8" stroke="#8B4513" stroke-width="1"/>
    <line x1="-15" y1="15" x2="-35" y2="15" stroke="#8B4513" stroke-width="1"/>
    <line x1="15" y1="10" x2="35" y2="8" stroke="#8B4513" stroke-width="1"/>
    <line x1="15" y1="15" x2="35" y2="15" stroke="#8B4513" stroke-width="1"/>
  </g>
  
  <!-- Optional: Title or Motto (if you want to add one later) -->
  <!-- <text x="200" y="450" font-family="Arial" font-size="16" text-anchor="middle" fill="#2c4a9e">Animalandia</text> -->
</svg>